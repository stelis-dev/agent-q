name: Publish npm packages

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    name: Publish npm packages
    if: contains(github.event.release.tag_name, '-front') == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Verify publish package graph
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const publishPackages = [
            'packages/core/package.json',
            'packages/agent-q/package.json',
            'packages/provider-sui/package.json',
          ];
          const privatePackages = [
            'packages/sample-sui-dapp-kit/package.json',
            'packages/sample-zklogin-test-web/package.json',
          ];

          const readPackage = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const server = JSON.parse(fs.readFileSync('server.json', 'utf8'));
          const packages = new Map(
            publishPackages.map((path) => {
              const pkg = readPackage(path);
              if (pkg.private === true) {
                throw new Error(`${pkg.name} is marked private and cannot be published`);
              }
              return [pkg.name, pkg];
            }),
          );

          const publishVersions = new Map(
            [...packages.values()].map((pkg) => [pkg.name, pkg.version]),
          );
          const uniquePublishVersions = new Set(publishVersions.values());
          if (uniquePublishVersions.size !== 1) {
            throw new Error(
              `publish packages must share one npm version, found ${[...publishVersions].map(([name, version]) => `${name}@${version}`).join(', ')}`,
            );
          }

          for (const path of privatePackages) {
            const pkg = readPackage(path);
            if (pkg.private !== true) {
              throw new Error(`${pkg.name} must stay private and must not be published`);
            }
          }

          const core = packages.get('@stelis/agent-q-core');
          for (const name of ['@stelis/agent-q', '@stelis/agent-q-provider-sui']) {
            const pkg = packages.get(name);
            const actual = pkg.dependencies?.[core.name];
            if (actual !== core.version) {
              throw new Error(`${pkg.name} must depend on ${core.name}@${core.version}, found ${actual ?? 'missing'}`);
            }
          }

          const agentQ = packages.get('@stelis/agent-q');
          const mcpPackage = server.packages?.[0];
          if (agentQ.mcpName !== server.name) {
            throw new Error(`${agentQ.name} mcpName must match server.json name`);
          }
          if (mcpPackage?.registryType !== 'npm' || mcpPackage.identifier !== agentQ.name) {
            throw new Error(`server.json must register the npm package ${agentQ.name}`);
          }
          if (server.version !== agentQ.version || mcpPackage.version !== agentQ.version) {
            throw new Error(`server.json versions must match ${agentQ.name}@${agentQ.version}`);
          }
          NODE

      - run: npm test

      - run: npm pack --workspace @stelis/agent-q-core --dry-run
      - run: npm pack --workspace @stelis/agent-q --dry-run
      - run: npm pack --workspace @stelis/agent-q-provider-sui --dry-run

      - name: Publish core package
        uses: JS-DevTools/npm-publish@v3
        id: agent-q-core
        with:
          access: public
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}
          package: packages/core/package.json
          strategy: upgrade

      - name: Publish local server package
        uses: JS-DevTools/npm-publish@v3
        id: agent-q
        with:
          access: public
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}
          package: packages/agent-q/package.json
          strategy: upgrade

      - name: Publish Sui provider package
        uses: JS-DevTools/npm-publish@v3
        id: agent-q-provider-sui
        with:
          access: public
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}
          package: packages/provider-sui/package.json
          strategy: upgrade

  publish-mcp-registry:
    name: Register on the MCP Registry
    needs: publish-npm
    if: ${{ !github.event.release.prerelease && contains(github.event.release.tag_name, '-front') == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Sync server.json version to @stelis/agent-q
        run: |
          VERSION="$(jq -r .version packages/agent-q/package.json)"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.json.tmp
          mv server.json.tmp server.json

      - name: Verify MCP Registry package marker
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const server = JSON.parse(fs.readFileSync('server.json', 'utf8'));
          const pkg = JSON.parse(fs.readFileSync('packages/agent-q/package.json', 'utf8'));
          const publishedPackage = server.packages?.[0];

          if (server.name !== pkg.mcpName) {
            throw new Error(`server.json name "${server.name}" must match ${pkg.name} mcpName "${pkg.mcpName}"`);
          }
          if (publishedPackage?.registryType !== 'npm' || publishedPackage.identifier !== pkg.name) {
            throw new Error(`server.json must register the npm package ${pkg.name}`);
          }
          if (server.version !== pkg.version || publishedPackage.version !== pkg.version) {
            throw new Error(`server.json versions must match ${pkg.name}@${pkg.version}`);
          }
          NODE

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to the MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to the MCP Registry
        run: ./mcp-publisher publish
